<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Game Path Extractor</title>
</head>
<body>
    <h1>Game Path:</h1>
    <p id="gamePath">Laden...</p>

    <script>
        // Pak de huidige URL
        const url = window.location.pathname;

        // Zoek naar "/game/" en pak alles erna
        const prefix = "/game/";
        let path = "";
        if (url.includes(prefix)) {
            path = url.split(prefix)[1]; // alles na /game/
        } else {
            path = "Geen game pad gevonden";
        }

        // Zet het in de paragraaf
        document.getElementById("gamePath").textContent = path;
    </script>
</body>
</html>
