<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Loader</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-label {
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
        }

        #content {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease 0.1s;
        }

        #content.visible {
            opacity: 1;
        }

        #content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 24px;
        }

        .error-code {
            font-size: clamp(80px, 15vw, 160px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #00e68a, #00bfff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-msg {
            margin-top: 16px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
        }

        .error-link {
            margin-top: 32px;
            padding: 12px 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.25s, border-color 0.25s, transform 0.2s;
        }

        .error-link:hover {
            background: rgba(0, 230, 138, 0.1);
            border-color: rgba(0, 230, 138, 0.3);
            transform: translateY(-1px);
        }

        .error-link:active {
            transform: translateY(0);
        }

        .error-link svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: middle;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-label">Loading</div>
    </div>

    <div id="content"></div>

    <script>
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');

        function reveal() {
            loader.classList.add('hidden');
            content.classList.add('visible');
        }

        function show404() {
            content.innerHTML = `
                <div class="error-page">
                    <div class="error-code">404</div>
                    <p class="error-msg">This page doesn't exist or has been moved.</p>
                    <a class="error-link" href="/">
                        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        Back to home
                    </a>
                </div>
            `;
            reveal();
        }

        function load404() {
            fetch('/404-main.txt')
                .then(res => {
                    if (!res.ok) throw new Error('not found');
                    return res.text();
                })
                .then(html => {
                    content.innerHTML = html;
                    reveal();
                })
                .catch(() => show404());
        }

        const path = window.location.pathname;

        if (path.startsWith('/game/')) {
            const suffix = path.slice(6).replace(/\/+$/, '');

            if (!suffix) {
                window.location.href = '/';
                return;
            }

            fetch('/games.json')
                .then(res => {
                    if (!res.ok) throw new Error('json error');
                    return res.json();
                })
                .then(data => {
                    let found = false;
                    let groupFound = null;

                    for (const group in data) {
                        if (data[group].includes(suffix)) {
                            found = true;
                            groupFound = group;
                            break;
                        }
                    }

                    if (found) {
                        const iframe = document.createElement('iframe');
                        iframe.src = '/' + groupFound + '/' + suffix;
                        iframe.addEventListener('load', reveal);
                        setTimeout(reveal, 8000);
                        content.appendChild(iframe);
                    } else {
                        show404();
                    }
                })
                .catch(() => show404());
        } else {
            load404();
        }
    </script>
</body>
</html>
