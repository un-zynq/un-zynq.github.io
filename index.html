<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">
  <title>ZYNQ (UN) - Dev Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-purple: #a371f7;
      --accent-orange: #d29922;
      --radius: 12px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* Layout */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-color);
      background: rgba(22, 27, 34, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .branding h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .branding h1 span { color: var(--accent-purple); }

    .env-badge {
      background: linear-gradient(135deg, var(--accent-orange), #db6d28);
      color: #000;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      vertical-align: middle;
      margin-left: 0.5rem;
      letter-spacing: 0.5px;
    }

    .stats-row {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-item strong { color: var(--text-primary); font-weight: 600; }

    /* Search Area */
    .search-wrapper {
      position: relative;
      max-width: 600px;
      width: 100%;
    }

    #search {
      width: 100%;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 0.9rem 1.2rem 0.9rem 2.8rem;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    #search:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn:hover {
      background: var(--bg-card);
      border-color: var(--text-secondary);
    }

    .btn.primary {
      background: var(--accent-green);
      color: #000;
      border-color: var(--accent-green);
      font-weight: 700;
    }

    .btn.primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 4px 12px rgba(63, 185, 80, 0.2);
    }

    /* Main Content */
    .main-content {
      padding: 2rem;
      flex-grow: 1;
    }

    /* Section Headers */
    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::after {
      content: '';
      flex-grow: 1;
      height: 1px;
      background: var(--border-color);
      opacity: 0.5;
    }

    /* Recent History - Horizontal Scroll */
    #recent-section {
      margin-bottom: 3rem;
      display: none; /* Hidden by default */
    }

    .recent-scroll {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 1rem;
      scroll-snap-type: x mandatory;
    }

    .recent-card {
      flex: 0 0 200px; /* Fixed width */
      background: linear-gradient(145deg, #1a1f25, #161b22);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 120px;
      scroll-snap-align: start;
      transition: transform 0.2s;
    }

    .recent-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-purple);
    }

    .recent-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .recent-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent-blue);
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    /* Game Grid */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    /* Game Card */
    .game-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.25s ease;
      position: relative;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-blue);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .card-header {
      padding: 1.25rem 1.25rem 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .status-badge {
      width: 10px;
      height: 10px;
      background: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-green);
      flex-shrink: 0;
      margin-top: 4px;
    }

    .card-body {
      padding: 0 1.25rem 1.25rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .path-display {
      background: var(--bg-color);
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent-blue);
      border: 1px solid var(--border-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 1rem;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: auto;
    }

    .card-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 0.6rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .card-btn:hover {
      background: var(--bg-card);
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    .card-btn.launch {
      background: var(--accent-green);
      color: #000;
      border-color: var(--accent-green);
      font-weight: 700;
    }

    .card-btn.launch:hover {
      filter: brightness(1.15);
      box-shadow: 0 4px 10px rgba(63, 185, 80, 0.3);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
      grid-column: 1 / -1;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      stroke: var(--border-color);
      margin-bottom: 1rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--accent-blue);
      color: var(--text-primary);
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 1rem; }
      .header-top { flex-direction: column; align-items: stretch; }
      .stats-row { margin-top: 0.5rem; }
      .controls { flex-direction: column; }
      .controls .btn { width: 100%; justify-content: center; }
      .main-content { padding: 1rem; }
      .game-grid { gap: 1rem; }
    }

    @media (max-width: 480px) {
      .game-grid {
        grid-template-columns: 1fr; /* Single column on very small screens */
      }
      .branding h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div id="app">
  
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="branding">
        <h1>
          <span>&lt;</span> ZYNQ <span>/&gt;</span>
          <span class="env-badge">Dev Env</span>
        </h1>
      </div>
      <div class="stats-row">
        <div class="stat-item">
          <!-- Clock Icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>Uptime: <strong id="uptime">--</strong></span>
        </div>
        <div class="stat-item">
          <!-- Box Icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <span>Endpoints: <strong id="count-text">0</strong></span>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrapper" style="max-width: 100%; flex-grow: 1;">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Filter endpoints..." autocomplete="off">
      </div>
      <button class="btn primary" id="random-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        Random
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    
    <!-- Recent History -->
    <div id="recent-section">
      <div class="section-title">Recent History</div>
      <div class="recent-scroll" id="recent-container">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- All Endpoints -->
    <div class="section-title">Available Endpoints</div>
    <div class="game-grid" id="games-container">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48 2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48 2.83-2.83"/>
        </svg>
        <p>Loading manifest...</p>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast" class="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
    <span id="toast-text">Action completed</span>
  </div>

</div>

<script>
  const container = document.getElementById('games-container');
  const recentContainer = document.getElementById('recent-container');
  const recentSection = document.getElementById('recent-section');
  const searchInput = document.getElementById('search');
  const gameCountEl = document.getElementById('count-text');
  const randomBtn = document.getElementById('random-btn');
  const uptimeEl = document.getElementById('uptime');
  const toastEl = document.getElementById('toast');
  const toastText = document.getElementById('toast-text');

  let allGameData = {};
  let allGames = [];

  // Uptime Counter
  let startTime = Date.now();
  setInterval(() => {
    let seconds = Math.floor((Date.now() - startTime) / 1000);
    let mins = Math.floor(seconds / 60);
    let secs = seconds % 60;
    uptimeEl.textContent = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  }, 1000);

  // Format name for display
  function formatName(name) {
    return name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  // Get folder path
  function getGamePath(gameName) {
    return ['g1','g2','g3','g4'].find(g => allGameData[g]?.includes(gameName)) || 'g1';
  }

  // Toast
  function showToast(msg) {
    toastText.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  // Copy Logic
  function copyPath(game) {
    const path = `${window.location.origin}/${getGamePath(game)}/${game}`;
    navigator.clipboard.writeText(path).then(() => {
      showToast('URL Copied to clipboard!');
    });
  }

  // Save Recent
  function saveRecent(game) {
    let recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    recent = [game, ...recent.filter(g => g !== game)].slice(0, 5); // Keep 5
    localStorage.setItem('recentGames', JSON.stringify(recent));
    renderRecent();
  }

  // Render Recent
  function renderRecent() {
    const recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    if (recent.length === 0) {
      recentSection.style.display = 'none';
      return;
    }
    recentSection.style.display = 'block';
    recentContainer.innerHTML = '';
    
    recent.forEach(game => {
      const path = getGamePath(game);
      const card = document.createElement('div');
      card.className = 'recent-card';
      card.innerHTML = `
        <div>
          <div class="recent-title">${formatName(game)}</div>
          <div class="recent-path">/${path}/${game}</div>
        </div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="card-btn" onclick="event.stopPropagation(); copyPath('${game}')" style="font-size: 0.7rem; padding: 0.4rem;">Copy</button>
          <a href="./${path}/${game}" target="_blank" class="card-btn launch" onclick="saveRecent('${game}')" style="font-size: 0.7rem; padding: 0.4rem;">Open</a>
        </div>
      `;
      recentContainer.appendChild(card);
    });
  }

  // Create Game Card
  function createGameCard(game) {
    const path = getGamePath(game);
    const formattedName = formatName(game);
    
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${formattedName}</div>
        <div class="status-badge" title="Online"></div>
      </div>
      <div class="card-body">
        <div class="path-display">/${path}/${game}</div>
        <div class="card-actions">
          <button class="card-btn" onclick="event.stopPropagation(); copyPath('${game}')">
            Copy URL
          </button>
          <a href="./${path}/${game}" target="_blank" class="card-btn launch" onclick="saveRecent('${game}')">
            Launch
          </a>
        </div>
      </div>
    `;
    return card;
  }

  function renderGames(games) {
    container.innerHTML = '';
    if (games.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <p>No endpoints found.</p>
        </div>
      `;
      return;
    }
    
    const fragment = document.createDocumentFragment();
    games.forEach(game => fragment.appendChild(createGameCard(game)));
    container.appendChild(fragment);
  }

  async function init() {
    try {
      const response = await fetch('./games.json');
      allGameData = await response.json();
      allGames = Object.values(allGameData).flat();
      gameCountEl.textContent = allGames.length;
      renderGames(allGames);
      renderRecent();
    } catch (e) {
      container.innerHTML = `
        <div class="empty-state" style="color: var(--accent-orange);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="stroke: var(--accent-orange);">
            <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6m0-6 6 6"/>
          </svg>
          <p>Failed to load games.json</p>
          <code style="font-size:0.8em; color:var(--text-secondary);">${e}</code>
        </div>
      `;
      gameCountEl.textContent = "Err";
    }
  }

  // Search
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const filtered = allGames.filter(g => g.toLowerCase().includes(query));
    renderGames(filtered);
  });

  // Random
  randomBtn.addEventListener('click', () => {
    if (allGames.length === 0) return;
    const randomGame = allGames[Math.floor(Math.random() * allGames.length)];
    saveRecent(randomGame);
    const path = `/${getGamePath(randomGame)}/${randomGame}`;
    showToast(`Launching ${formatName(randomGame)}...`);
    setTimeout(() => {
       window.open(`.${path}`, '_blank');
    }, 400);
  });

  init();
</script>

</body>
</html>
