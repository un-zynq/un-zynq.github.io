<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Game Vault</title>
    <style>
        :root {
            --bg-main: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Background Effect --- */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 128, 0.05) 0%, transparent 25%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- Header Section --- */
        header {
            padding: 60px 20px 40px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .stats {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item span {
            color: var(--accent);
            font-weight: bold;
        }

        /* --- Search Bar --- */
        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        input[type="text"] {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.1rem;
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        /* --- Grid Layout --- */
        #games-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* --- Game Card --- */
        .game-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: translateY(20px);
            /* Animation setup */
            animation: fadeInUp 0.5s ease forwards;
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .card-content {
            padding: 25px;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
        }

        .play-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.2rem;
            transition: background 0.2s;
            flex-shrink: 0;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .game-card:hover .play-icon {
            background: #fff;
        }

        /* Make the whole card clickable */
        .game-link {
            text-decoration: none;
            color: white;
            display: block;
            height: 100%;
        }

        /* --- Visual Polish --- */
        .glow-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .game-card:hover .glow-line {
            opacity: 1;
        }

        /* --- Loading & Error States --- */
        #status-message {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .error { color: #ff4d4d; }
        
        /* No results found style */
        #no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
            display: none;
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stagger animation for children */
        #games-container .game-card:nth-child(1) { animation-delay: 0.05s; }
        #games-container .game-card:nth-child(2) { animation-delay: 0.1s; }
        #games-container .game-card:nth-child(3) { animation-delay: 0.15s; }
        #games-container .game-card:nth-child(4) { animation-delay: 0.2s; }
        #games-container .game-card:nth-child(5) { animation-delay: 0.25s; }
        /* ... handles more items gracefully */

    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <header>
        <h1>GAME VAULT</h1>
        <div class="stats">
            <div class="stat-item">Total Games: <span id="total-count">0</span></div>
            <div class="stat-item">Showing: <span id="visible-count">0</span></div>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search for a game...">
        </div>
    </header>

    <main>
        <div id="games-container">
            <div id="status-message">Loading library...</div>
        </div>
        <div id="no-results">No games found matching your search.</div>
    </main>

    <script>
        // Cache DOM elements
        const container = document.getElementById('games-container');
        const searchBar = document.getElementById('search-bar');
        const totalCountEl = document.getElementById('total-count');
        const visibleCountEl = document.getElementById('visible-count');
        const statusMsg = document.getElementById('status-message');
        const noResultsMsg = document.getElementById('no-results');

        let allGames = [];

        // Fetch data
        async function initializeLibrary() {
            try {
                const response = await fetch('./games.json');
                
                if (!response.ok) throw new Error('File not found');
                
                allGames = await response.json();
                
                // Update stats
                totalCountEl.textContent = allGames.length;
                visibleCountEl.textContent = allGames.length;
                
                // Clear loading message
                statusMsg.style.display = 'none';
                
                // Render all games
                renderGames(allGames);

            } catch (error) {
                statusMsg.innerHTML = `<span class="error">Error: Could not load games.json.<br>Make sure you are running this on a local server.</span>`;
                console.error(error);
            }
        }

        // Render list
        function renderGames(games) {
            // Clear current list (except status messages)
            const currentCards = container.querySelectorAll('.game-card');
            currentCards.forEach(card => card.remove());

            if (games.length === 0) {
                noResultsMsg.style.display = 'block';
                visibleCountEl.textContent = '0';
                return;
            } else {
                noResultsMsg.style.display = 'none';
                visibleCountEl.textContent = games.length;
            }

            games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                // Add dynamic animation delay based on new index
                card.style.animationDelay = `${index * 0.03}s`;

                card.innerHTML = `
                    <a href="${game.path}" class="game-link">
                        <div class="glow-line"></div>
                        <div class="card-content">
                            <h3 class="game-title" title="${game.name}">${game.name}</h3>
                            <div class="play-icon">▶</div>
                        </div>
                    </a>
                `;

                container.appendChild(card);
            });
        }

        // Search functionality
        searchBar.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allGames.filter(game => 
                game.name.toLowerCase().includes(term)
            );
            renderGames(filtered);
        });

        // Initialize on load
        initializeLibrary();

    </script>
</body>
</html>
