<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Overzicht</title>
    <style>
        /* Basis styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eaeaea;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #0f3460;
            background-color: #e94560;
            padding: 10px 30px;
            border-radius: 5px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Container voor de lijst */
        #games-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        /* Styling per game item */
        .game-card {
            background-color: #16213e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #0f3460;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(233, 69, 96, 0.2);
            border-color: #e94560;
        }

        /* Styling voor de links */
        .game-card a {
            text-decoration: none;
            color: #eaeaea;
            font-size: 1.1em;
            font-weight: bold;
            display: block;
        }

        .game-card a:hover {
            color: #e94560;
        }
    </style>
</head>
<body>

    <h1>Game Bibliotheek</h1>
    
    <!-- Hier komen de games te staan -->
    <div id="games-list"></div>

    <script>
        // Functie om de JSON data op te halen
        async function loadGames() {
            try {
                // Het pad naar je JSON bestand
                const response = await fetch('./games.json');
                
                // Check of het bestand bestaat
                if (!response.ok) {
                    throw new Error('Kon games.json niet laden. Controleer of het bestand in dezelfde map staat.');
                }

                // Zet de data om naar JSON
                const games = await response.json();
                
                // Selecteer de container
                const listContainer = document.getElementById('games-list');
                
                // Leeg de container eerst (voor het geval dat nodig is)
                listContainer.innerHTML = '';

                // Loop door elke game en maak HTML elementen
                games.forEach(game => {
                    // Maak een div voor de card
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    // Maak de link aan
                    const link = document.createElement('a');
                    link.href = game.path; // Het pad uit de JSON
                    link.textContent = game.name; // De naam uit de JSON
                    
                    // Voeg de link toe aan de card
                    card.appendChild(link);
                    
                    // Voeg de card toe aan de lijst
                    listContainer.appendChild(card);
                });

            } catch (error) {
                console.error('Er is een fout opgetreden:', error);
                document.getElementById('games-list').innerHTML = '<p style="color:red">Fout bij laden van games. Controleer de console (F12) voor meer info.</p>';
            }
        }

        // Start de functie zodra de pagina laadt
        loadGames();
    </script>

</body>
</html>
